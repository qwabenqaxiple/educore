services:
  # ─── Backend API (Web Service) ─────────────────────────────────────────────
  - type: web
    name: educore-api
    runtime: node
    rootDir: educore/backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: educore-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://frontend-ten-eta-jssfa4gpix.vercel.app

  # ─── PostgreSQL Database ───────────────────────────────────────────────────
databases:
  - name: educore-db
    databaseName: educore
    user: educore
    plan: free
