services:
  # ─── Backend API (Web Service) ─────────────────────────────────────────────
  - type: web
    name: educore-api
    runtime: docker
    plan: starter
    region: oregon
    rootDir: educore/backend
    dockerCommand: npm ci --omit=dev
    dockerContext: educore/backend
    dockerfilePath: ./educore/backend/Dockerfile
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: educore-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://frontend-one-opal-noxuosmprr.vercel.app
      - key: AUTH_TYPE
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

  # ─── PostgreSQL Database ───────────────────────────────────────────────────

  # ─── PostgreSQL Database ───────────────────────────────────────────────────
databases:
  - name: educore-db
    databaseName: educore
    user: educore
    plan: free
